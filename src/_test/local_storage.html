<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>브라우저 하드디스(localStorage) 테스트</h1>

    <button id="btnLogin">1. 데이터 저장(가짜 로그인)</button>
    <button id="btnCheck">2. 데이터 조회(상태 확인)</button>
    <button id="btnLogout">3. 데이터 삭제(로그 아웃)</button>

    <div id="result">여기에 결과가 나옵니다.</div>
    <script>
      const btnLogin = document.getElementById("btnLogin");
      const btnCheck = document.getElementById("btnCheck");
      const btnLogout = document.getElementById("btnLogout");
      const resultDiv = document.getElementById("result");

      // 1. 데이터 저장하기 (로컬 스토리지 사용)
      btnLogin.addEventListener("click", () => {
        //  단순 문자열 저장함
        localStorage.setItem("token", "wjdghldnr123");

        // 객체를 저장할 시
        const userObject = { username: "홍길동", role: "USER" };
        // 객체 --> 문자열 바꾸는 JS 문법
        localStorage.setItem("user", JSON.stringify(userObject));

        resultDiv.innerText = "데이터를 저장했습니다.";
        resultDiv.style.color = "black";
      });

      // 2. 데이터를 꺼내는 방법
      btnCheck.addEventListener("click", () => {
        // 로컬 스토리지에 저장된 데이터 중 키 값인 token을 데이터로 가져오는 방법
        const savedToken = localStorage.getItem("token");
        const savedUser = JSON.parse(localStorage.getItem("user"));

        resultDiv.innerHTML = savedToken;
        resultDiv.innerHTML += "/n" + savedUser.username;
        resultDiv.style.color = "green";
      });

      // 3. 데이터를 삭제하는 방법
      btnLogout.addEventListener("click", () => {
        // 로컬 스토리지에 있는 키값 기준으로 데이터를 삭제하는 방법
        localStorage.removeItem("token");
        localStorage.removeItem("user");

        resultDiv.innerHTML = "로그인 정보가 삭제되었습니다.";
        resultDiv.style.color = "red";
      });
    </script>
  </body>
</html>
